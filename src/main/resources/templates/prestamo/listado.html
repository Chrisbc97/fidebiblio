<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>

        <div class="app-layout">
            <div th:replace="~{general/fragmentos :: sidebar}"></div>

            <div class="app-content">
                <div th:replace="~{general/fragmentos :: topbar}"></div>
                <div th:replace="~{general/fragmentos :: mostrarToast}"></div>

                <section class="container-fluid p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 style="color:#0f2a4a;">Préstamos Activos</h3>
                        <button class="btn btn-navy" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                            <i class="fa-solid fa-plus"></i> Registrar Préstamo
                        </button>
                    </div>

                    <table class="table table-striped table-hover bg-white">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Estudiante</th>
                                <th>Libro</th>
                                <th>Fecha préstamo</th>
                                <th>Fecha límite</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${prestamos}">
                                <td th:text="${p.idPrestamo}"></td>
                                <td th:text="${p.usuario.nombreCompleto}"></td>
                                <td th:text="${p.libro.titulo}"></td>
                                <td th:text="${#temporals.format(p.fechaPrestamo,'dd/MM/yyyy')}"></td>
                                <td th:text="${#temporals.format(p.fechaLimite,'dd/MM/yyyy')}"></td>
                                <td><span class="badge badge-disponible" th:text="${p.estado}"></span></td>
                                <td>
                                    <form class="d-inline" method="post" th:action="@{/prestamo/renovar}">
                                        <input type="hidden" name="idPrestamo" th:value="${p.idPrestamo}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-secondary">Renovar</button>
                                    </form>
                                    <form class="d-inline" method="post" th:action="@{/prestamo/finalizar}">
                                        <input type="hidden" name="idPrestamo" th:value="${p.idPrestamo}"/>
                                        <button type="submit" class="btn btn-sm btn-navy">Devolver</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(prestamos)}">
                                <td colspan="7" class="text-center text-muted">No hay préstamos activos</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </div>

        <div class="modal fade" id="modalAgregar" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form method="post" th:action="@{/prestamo/guardar}" class="was-validated">
                        <div class="modal-header" style="background-color:#0f2a4a;">
                            <h5 class="modal-title text-white">Registrar Préstamo</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-2">
                                <label class="form-label">Estudiante</label>
                                <select name="idUsuario" class="form-select" required>
                                    <option th:each="u : ${usuarios}" th:value="${u.idUsuario}" th:text="${u.nombreCompleto}"></option>
                                </select>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Libro</label>
                                <select name="idLibro" class="form-select" required>
                                    <option th:each="l : ${libros}" th:value="${l.idLibro}"
                                            th:text="${l.titulo + ' (' + l.ejemplaresDisponibles + ' disp.)'}"></option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-navy">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </body>
</html>
