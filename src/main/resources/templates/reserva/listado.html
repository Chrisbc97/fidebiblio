<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>

        <div class="app-layout">
            <div th:replace="~{general/fragmentos :: sidebar}"></div>

            <div class="app-content">
                <div th:replace="~{general/fragmentos :: topbar}"></div>
                <div th:replace="~{general/fragmentos :: mostrarToast}"></div>

                <section class="container-fluid p-4">
                    <h3 style="color:#0f2a4a;">Mis Reservas</h3>

                    <table class="table table-striped table-hover bg-white">
                        <thead>
                            <tr>
                                <th>Libro</th>
                                <th>Fecha de reserva</th>
                                <th>Posición en la cola</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="r : ${reservas}">
                                <td th:text="${r.libro.titulo}"></td>
                                <td th:text="${#temporals.format(r.fechaReserva,'dd/MM/yyyy')}"></td>
                                <td th:text="${'#' + r.posicion}"></td>
                                <td><span class="badge bg-info" th:text="${r.estado}"></span></td>
                                <td>
                                    <form method="post" th:action="@{/reserva/cancelar}"
                                          onsubmit="return confirm('¿Cancelar esta reserva?');">
                                        <input type="hidden" name="idReserva" th:value="${r.idReserva}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger">Cancelar</button>
                                    </form>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(reservas)}">
                                <td colspan="5" class="text-center text-muted">No tiene reservas activas</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </div>

    </body>
</html>
