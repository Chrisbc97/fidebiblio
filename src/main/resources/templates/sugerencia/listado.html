<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>

        <div class="app-layout">
            <div th:replace="~{general/fragmentos :: sidebar}"></div>

            <div class="app-content">
                <div th:replace="~{general/fragmentos :: topbar}"></div>
                <div th:replace="~{general/fragmentos :: mostrarToast}"></div>

                <section class="container-fluid p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 style="color:#0f2a4a;">Sugerencias de Compra</h3>
                        <button class="btn btn-navy" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                            <i class="fa-solid fa-plus"></i> Proponer Adquisición
                        </button>
                    </div>

                    <table class="table table-striped table-hover bg-white">
                        <thead>
                            <tr>
                                <th>Título</th>
                                <th>Autor</th>
                                <th>Votos</th>
                                <th>Estado</th>
                                <th sec:authorize="hasAnyRole('ADMINISTRADOR','BIBLIOTECARIO')">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${sugerencias}">
                                <td th:text="${s.titulo}"></td>
                                <td th:text="${s.autor}"></td>
                                <td th:text="${s.votos}"></td>
                                <td>
                                    <span th:if="${s.estado == 'PENDIENTE'}" class="badge bg-secondary">Pendiente</span>
                                    <span th:if="${s.estado == 'APROBADA'}" class="badge badge-disponible">Aprobada</span>
                                    <span th:if="${s.estado == 'RECHAZADA'}" class="badge badge-prestado">Rechazada</span>
                                </td>
                                <td sec:authorize="hasAnyRole('ADMINISTRADOR','BIBLIOTECARIO')">
                                    <span th:if="${s.estado != 'PENDIENTE'}">-</span>
                                    <span th:if="${s.estado == 'PENDIENTE'}">
                                        <form class="d-inline" method="post" th:action="@{/sugerencia/estado}">
                                            <input type="hidden" name="idSugerencia" th:value="${s.idSugerencia}"/>
                                            <input type="hidden" name="estado" value="APROBADA"/>
                                            <button type="submit" class="btn btn-sm btn-outline-success">Aprobar</button>
                                        </form>
                                        <form class="d-inline" method="post" th:action="@{/sugerencia/estado}">
                                            <input type="hidden" name="idSugerencia" th:value="${s.idSugerencia}"/>
                                            <input type="hidden" name="estado" value="RECHAZADA"/>
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Rechazar</button>
                                        </form>
                                    </span>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(sugerencias)}">
                                <td colspan="5" class="text-center text-muted">No hay sugerencias registradas</td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </div>

        <!-- Modal para proponer libro -->
        <div class="modal fade" id="modalAgregar" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form method="post" th:action="@{/sugerencia/guardar}" class="was-validated">
                        <div class="modal-header" style="background-color:#0f2a4a;">
                            <h5 class="modal-title text-white">Proponer Adquisición</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-2">
                                <label class="form-label">Título</label>
                                <input type="text" name="titulo" class="form-control" required/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Autor</label>
                                <input type="text" name="autor" class="form-control"/>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-navy">Enviar Propuesta</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </body>
</html>
