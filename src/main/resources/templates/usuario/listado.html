<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body>

        <div class="app-layout">
            <div th:replace="~{general/fragmentos :: sidebar}"></div>

            <div class="app-content">
                <div th:replace="~{general/fragmentos :: topbar}"></div>
                <div th:replace="~{general/fragmentos :: mostrarToast}"></div>

                <section class="container-fluid p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h3 style="color:#0f2a4a;">Usuarios (<span th:text="${totalUsuarios}"></span>)</h3>
                        <button class="btn btn-navy" data-bs-toggle="modal" data-bs-target="#modalAgregar">
                            <i class="fa-solid fa-plus"></i> Nuevo Usuario
                        </button>
                    </div>

                    <form class="d-flex mb-3" method="get" th:action="@{/usuario/buscar}">
                        <input type="text" name="termino" class="form-control me-2" placeholder="Buscar por nombre o correo"/>
                        <button class="btn btn-outline-secondary" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
                    </form>

                    <table class="table table-striped table-hover bg-white">
                        <thead>
                            <tr>
                                <th>Identificación</th>
                                <th>Nombre completo</th>
                                <th>Correo</th>
                                <th>Teléfono</th>
                                <th>Rol</th>
                                <th>Activo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="u : ${usuarios}">
                                <td th:text="${u.identificacion}"></td>
                                <td th:text="${u.nombreCompleto}"></td>
                                <td th:text="${u.correo}"></td>
                                <td th:text="${u.telefono}"></td>
                                <td th:text="${u.rol}"></td>
                                <td>
                                    <span th:if="${u.activo}" class="badge badge-disponible">Sí</span>
                                    <span th:unless="${u.activo}" class="badge bg-secondary">No</span>
                                </td>
                                <td>
                                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/usuario/modificar/{id}(id=${u.idUsuario})}">
                                        <i class="fa-solid fa-pen"></i>
                                    </a>
                                    <form class="d-inline" method="post" th:action="@{/usuario/eliminar}"
                                          onsubmit="return confirm('¿Desactivar este usuario?');">
                                        <input type="hidden" name="idUsuario" th:value="${u.idUsuario}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-ban"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </div>

        <!-- Modal para crear usuario -->
        <div class="modal fade" id="modalAgregar" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form method="post" th:action="@{/usuario/guardar}" class="was-validated">
                        <div class="modal-header" style="background-color:#0f2a4a;">
                            <h5 class="modal-title text-white">Crear Usuario</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-2">
                                <label class="form-label">Identificación</label>
                                <input type="text" name="identificacion" class="form-control" required/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Nombre</label>
                                <input type="text" name="nombre" class="form-control" required/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Primer apellido</label>
                                <input type="text" name="primerApellido" class="form-control" required/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Segundo apellido</label>
                                <input type="text" name="segundoApellido" class="form-control"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Correo</label>
                                <input type="email" name="correo" class="form-control" required/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Teléfono</label>
                                <input type="text" name="telefono" class="form-control"/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Contraseña</label>
                                <input type="password" name="password" class="form-control" required/>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Rol</label>
                                <select name="rol" class="form-select" required>
                                    <option value="ADMINISTRADOR">Administrador</option>
                                    <option value="BIBLIOTECARIO">Bibliotecario</option>
                                    <option value="ESTUDIANTE" selected>Estudiante</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-navy">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </body>
</html>
